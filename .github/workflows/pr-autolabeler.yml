name: PR Autolabeler

on:
  pull_request_target:

permissions:
  pull-requests: write

jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter/autolabeler@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        with:
          config-name: release-drafter.yml
