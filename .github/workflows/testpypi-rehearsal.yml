name: TestPyPI Rehearsal

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Optional version to smoke after upload (defaults to pyproject version)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-and-smoke:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/callchain/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Local install smoke
        run: |
          python scripts/install_smoke.py \
            --dist-dir dist \
            --example examples/smoke_repo \
            --json \
            --output build/testpypi-local-install-smoke.json

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Determine package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import re
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"$', text, re.M)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")
          print(f"version={match.group(1)}")
          PY

      - name: TestPyPI install smoke
        env:
          PACKAGE_VERSION: ${{ github.event.inputs.package_version || steps.version.outputs.version }}
        run: |
          python scripts/install_smoke.py \
            --package-spec "callchain==${PACKAGE_VERSION}" \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            --example examples/smoke_repo \
            --json \
            --output build/testpypi-install-smoke.json

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-rehearsal-artifacts
          path: |
            build/testpypi-local-install-smoke.json
            build/testpypi-install-smoke.json
