name: Corpus Baseline Refresh

on:
  pull_request_target:
    types:
      - closed

jobs:
  refresh:
    if: ${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'corpus-drift-approved') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare build directory
        run: mkdir -p build

      - name: Validate corpus source metadata
        run: python scripts/check_corpus_sources.py

      - name: Verify vendored archive provenance
        run: python scripts/verify_corpus_source_archive.py click-src

      - name: Capture baseline refresh snapshot
        run: python scripts/check_corpus.py --json --output build/corpus-baseline-refresh-snapshot.json

      - name: Capture baseline refresh benchmark
        run: python scripts/benchmark_corpus.py --iterations 3 --warmup 1 --json --output build/corpus-baseline-refresh-benchmark.json

      - name: Render refresh summary
        run: |
          {
            echo "## Corpus Baseline Refresh"
            echo
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Merge commit: \`${{ github.event.pull_request.merge_commit_sha }}\`"
            echo "- Trigger label: \`corpus-drift-approved\`"
            echo
            python scripts/check_corpus.py
            echo
            python scripts/benchmark_corpus.py --iterations 3 --warmup 1
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR refresh comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- callchain-corpus-baseline-refresh -->";
            const commentBody = `${marker}

            A post-merge corpus baseline refresh candidate was captured for this drift-approved PR.

            - Merge commit: \`${{ github.event.pull_request.merge_commit_sha }}\`
            - Artifact bundle: \`corpus-baseline-refresh-${{ github.event.pull_request.number }}-${{ github.run_id }}\`
            - Included files: \`corpus-baseline-refresh-snapshot.json\`, \`corpus-baseline-refresh-benchmark.json\`, \`test_repos/sources.toml\`

            Review this artifact bundle when promoting the next official corpus baseline.`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

      - name: Upload baseline refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corpus-baseline-refresh-${{ github.event.pull_request.number }}-${{ github.run_id }}
          retention-days: 30
          path: |
            build/corpus-baseline-refresh-snapshot.json
            build/corpus-baseline-refresh-benchmark.json
            test_repos/sources.toml
