- name: "bug"
  color: "d73a4a"
  description: "Something is broken or regressed."
- name: "fix"
  color: "b60205"
  description: "A pull request that fixes an issue."
- name: "enhancement"
  color: "a2eeef"
  description: "An incremental improvement to existing behavior."
- name: "feature"
  color: "0e8a16"
  description: "A net-new capability or major end-user enhancement."
- name: "maintenance"
  color: "cfd3d7"
  description: "Internal upkeep, refactors, or repo management work."
- name: "dependencies"
  color: "0366d6"
  description: "Dependency update or supply-chain maintenance."
- name: "ci"
  color: "5319e7"
  description: "Continuous integration or automation pipeline changes."
- name: "documentation"
  color: "0075ca"
  description: "Docs, templates, or contributor guidance updates."
- name: "question"
  color: "d876e3"
  description: "A usage question or request for clarification."
- name: "needs-triage"
  color: "fbca04"
  description: "Awaiting initial maintainer review and routing."
- name: "needs-repro"
  color: "bfdadc"
