- name: "security"
  color: "b60205"
  description: "Security-sensitive issue or response work."
- name: "stale"
  color: "c5def5"
  description: "No recent activity; automation may close it soon."
- name: "skip-changelog"
  color: "000000"
  description: "Exclude this PR from drafted release notes."
- name: "major"
  color: "b60205"
  description: "Represents a major-version worthy change."
- name: "minor"
  color: "1d76db"
