name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes in this cycle."

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Maintenance"
    labels:
      - "maintenance"
      - "dependencies"
      - "ci"
      - "documentation"

exclude-labels:
  - "skip-changelog"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
      - "minor"
  patch:
    labels:
      - "bug"
      - "fix"
      - "maintenance"
      - "dependencies"
      - "ci"
      - "documentation"
  default: patch

autolabeler:
  - label: "documentation"
    files:
      - "*.md"
      - ".github/**"
  - label: "ci"
    files:
      - ".github/workflows/**"
  - label: "dependencies"
    branch:
      - "/^deps\\//"
      - "/^dependabot\\//"
  - label: "feature"
    branch:
      - "/^feat\\//"
  - label: "bug"
    branch:
      - "/^fix\\//"
  - label: "maintenance"
    files:
      - "scripts/**"
      - "src/callchain/devtools/**"

template: |
  ## What's Changed

  $CHANGES

  ## Version

  Next version: `v$RESOLVED_VERSION`
